<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Tanmay Kapoor</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #060606;
      --gold: #c5a880;
      --bronze: #9c978e;
      --cream: #f5f2eb;
      --charcoal: #a6a198;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-primary);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Soft background glows similar to the main portfolio */
    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(150px);
      opacity: 0.15;
    }
    .orb-1 {
      top: -10%;
      left: -10%;
      background: radial-gradient(circle, #f59e0b 0%, transparent 70%);
    }
    .orb-2 {
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, #ca8a04 0%, transparent 70%);
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 10;
      padding: 20px;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 120px;
      font-weight: 800;
      margin: 0;
      line-height: 1;
      background: linear-gradient(135deg, var(--gold) 0%, var(--cream) 50%, var(--bronze) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -2px;
    }

    h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 600;
      margin-top: 10px;
      margin-bottom: 20px;
      color: var(--cream);
    }

    p {
      color: var(--charcoal);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--bronze) 100%);
      color: var(--bg-primary);
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      border-radius: 9999px;
      box-shadow: 0 4px 20px rgba(197, 168, 128, 0.15);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(197, 168, 128, 0.25);
      opacity: 0.95;
    }

    .btn svg {
      width: 16px;
      height: 16px;
      stroke: var(--bg-primary);
    }
  </style>
</head>
<body>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  
  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    
    <a href="https://www.tanmayk.tech/" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Back to Portfolio
    </a>
  </div>
</body>
</html>
